<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
        // variable is a container which holds the value
        var myName="ABES";
        document.write(myName);
        console.log(myName);
        //JS excution and scope(Global and locaal)
        function demo(){
            var msg="thanks"//local variable
            console.log(msg);
        }
        demo();
        //variable declartion using let and const
        let msg2="Thanks Again";
        console.log(msg2);
        const msg3="Thanks to visit my page";
        console.log(msg3);

    </script>
</body>
</html>
