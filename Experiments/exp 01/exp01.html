<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      font-family: Arial, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    .header{
      background: linear-gradient(to right, #3fa9f5, #1e88e5);
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .navbar-custom{
      background-color: #6c757d;
    }

    .navbar-custom .nav-link,
    .navbar-custom .navbar-brand{
      color: white;
    }

    .content{
      padding: 15px;
      height: calc(100vh - 160px);
      display: flex;
      align-items: center;
    }

    .column-box{
      border-right: 1px solid #ccc;
      padding: 15px;
      height: 180px; /* smaller grid size */
    }

    .column-box h4{
      font-size: 20px;
      margin-bottom: 10px;
    }

    .column-box p{
      font-size: 14px;
      margin: 0;
    }

    .footer{
      background-color: black;
      color: white;
      text-align: center;
      padding: 12px;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 15px;
    }

    @media (max-width: 768px){
      .column-box{
        border-right: none;
        border-bottom: 1px solid #ccc;
        margin-bottom: 15px;
        height: auto;
      }

      .content{
        height: auto;
      }

      body{
        overflow: auto;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    My Website
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Website</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Services</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="container content">
    <div class="row w-100">
      
      <div class="col-md-6 column-box">
        <h4>Column 1</h4>
        <p>
          This is some sample text for column 1. It adjusts according to screen size.
        </p>
      </div>

      <div class="col-md-6 column-box border-0">
        <h4>Column 2</h4>
        <p>
          This is some sample text for column 2. It is responsive using Bootstrap grid.
        </p>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Copyright © 2025 Website
    <br>
    <br>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
